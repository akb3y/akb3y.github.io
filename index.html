<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sphere Volume Calculator</title>
</head>
<body>
  <h1>Sphere Volume Calculator</h1>
  <form id="sphere-form">
    <label for="radius">Radius:</label>
    <input type="number" id="radius" name="radius" required>
    <button type="submit">Calculate</button>
  </form>
  <div id="result"></div>

  <!-- Include the index.js script -->
  <script src="index.js"></script>

  <script>
    document.getElementById('sphere-form').addEventListener('submit', function(event) {
      event.preventDefault();
      const radius = parseFloat(document.getElementById('radius').value);
      if (!isNaN(radius)) {
        const volume = calculateSphereVolume(radius);
        document.getElementById('result').innerText = `The volume of the sphere is: ${volume}`;
      } else {
        document.getElementById('result').innerText = 'Please enter a valid radius.';
      }
    });
  </script>
</body>
</html>
